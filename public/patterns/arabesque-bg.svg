<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <pattern id="islamic" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- 8-pointed star -->
      <polygon points="50,10 54,38 75,25 62,46 90,50 62,54 75,75 54,62 50,90 46,62 25,75 38,54 10,50 38,46 25,25 46,38"
        fill="none" stroke="#D4AF37" stroke-width="0.6"/>
      <!-- Inner circle -->
      <circle cx="50" cy="50" r="15" fill="none" stroke="#D4AF37" stroke-width="0.5"/>
      <!-- Cross lines -->
      <line x1="50" y1="35" x2="50" y2="65" stroke="#D4AF37" stroke-width="0.4"/>
      <line x1="35" y1="50" x2="65" y2="50" stroke="#D4AF37" stroke-width="0.4"/>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#islamic)"/>
</svg>
